    [package]
    name = "amplifier-android"
    version = "0.1.0"
    edition = "2021"

    [lib]
    crate-type = ["cdylib"]

    [dependencies]
    # amplifier-core — the Rust kernel (Provider/Tool/Orchestrator traits + Session lifecycle)
    amplifier-core = { git = "https://github.com/microsoft/amplifier-core" }

    # JNI bridge
    jni = "0.21"

    # Async runtime (tokio already pulled in by amplifier-core, re-declared for block_on)
    tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

    # HTTP for Anthropic provider (pure-Rust TLS — no OpenSSL needed)
    reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }

    # Serialisation
    serde = { version = "1", features = ["derive"] }
    serde_json = "1"

    # Static runtime initialisation
    once_cell = "1"

    # Android logging
    android_logger = "0.14"
    log = "0.4"

    [profile.release]
    opt-level = "z"      # minimise binary size
    strip = true
    lto = true
    