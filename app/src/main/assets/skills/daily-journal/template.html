<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Journal</title>
  <script type="importmap">{"imports":{"lit":"/lib/lit-core.min.js","@vela/runtime":"/lib/vela-runtime.js","@vela/":"/blocks/"}}</script>
  <script type="module">
    import '@vela/vela-checklist.js';
    import '@vela/vela-heatmap-calendar.js';
    import { vela } from '@vela/runtime';
    window.onVelaReady = async () => {
      const ctx = vela.app.context;
      if (ctx.theme?.isDark) document.documentElement.style.setProperty('--bg','#1a1a1f');
      document.documentElement.style.setProperty('--primary', ctx.theme?.primaryColor || '#7c6ff7');

      const data = await vela.miniapp.data();
      if (!data) { document.getElementById('title').textContent = 'Preparing journal…'; return; }

      document.getElementById('title').textContent = data.date || 'Journal';

      // Habits from extracted data
      const habits = (data.habits || []).map(h =>
        typeof h === 'string' ? { text: h, done: false } : { text: h.name, done: !!h.done }
      );
      const wins = (data.wins || []).map(w => ({ text: w, done: true }));
      document.querySelector('vela-checklist').items = [...habits, ...wins];
      document.querySelector('vela-checklist').title = data.mood ? `Today · ${data.mood}` : 'Today';

      // Heatmap — placeholder data for now (would need db query for history)
      document.querySelector('vela-heatmap-calendar').data = Array.from({length: 84}, () => Math.random() > 0.3 ? Math.floor(Math.random() * 5) + 1 : 0);
      document.querySelector('vela-heatmap-calendar').title = 'Consistency';
    };
  </script>
  <style>
    :root{--primary:#7c6ff7;--surface2:#f3f4f6;--border:#e5e7eb;--muted:#9ca3af;--text:#111;--bg:#fff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding:16px}
    h1{font-size:22px;font-weight:700;margin-bottom:16px}
    section{margin-bottom:24px}
    h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
  </style>
</head>
<body>
  <h1 id="title">Loading…</h1>
  <section><h2>Habits</h2><vela-checklist></vela-checklist></section>
  <section><h2>Activity</h2><vela-heatmap-calendar></vela-heatmap-calendar></section>
</body>
</html>
