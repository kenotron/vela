<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Meeting</title>
  <script type="importmap">{"imports":{"lit":"/lib/lit-core.min.js","@vela/runtime":"/lib/vela-runtime.js","@vela/":"/blocks/"}}</script>
  <script type="module">
    import '@vela/vela-action-list.js';
    import '@vela/vela-metadata-card.js';
    import { vela } from '@vela/runtime';
    window.onVelaReady = async () => {
      const ctx = vela.app.context;
      if (ctx.theme?.isDark) document.documentElement.style.setProperty('--bg','#1a1a1f');
      document.documentElement.style.setProperty('--primary', ctx.theme?.primaryColor || '#7c6ff7');

      const data = await vela.miniapp.data();
      if (!data) { document.getElementById('title').textContent = 'Preparing meeting notes…'; return; }

      document.getElementById('title').textContent = data.title || 'Meeting';
      document.querySelector('vela-metadata-card').frontmatter = {
        date:      data.date      || '—',
        attendees: (data.attendees || []).join(', ') || '—',
        decisions: (data.decisions || []).length + ' decisions',
      };
      document.querySelector('vela-action-list').items = (data.actionItems || []).map(item => ({
        text:     typeof item === 'string' ? item : item.text,
        assignee: typeof item === 'object' ? item.assignee : null,
        done:     false,
      }));
    };
  </script>
  <style>
    :root{--primary:#7c6ff7;--surface2:#f3f4f6;--border:#e5e7eb;--muted:#9ca3af;--text:#111;--bg:#fff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding:16px}
    h1{font-size:20px;font-weight:700;margin-bottom:16px}
    section{margin-bottom:24px}
    h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
  </style>
</head>
<body>
  <h1 id="title">Loading…</h1>
  <section><h2>Details</h2><vela-metadata-card></vela-metadata-card></section>
  <section><h2>Action Items</h2><vela-action-list></vela-action-list></section>
</body>
</html>
