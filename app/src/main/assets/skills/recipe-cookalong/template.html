<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recipe</title>
  <script type="importmap">{"imports":{"lit":"/lib/lit-core.min.js","@vela/runtime":"/lib/vela-runtime.js","@vela/":"/blocks/"}}</script>
  <script type="module">
    import '@vela/vela-step-through.js';
    import '@vela/vela-checklist.js';
    import { vela } from '@vela/runtime';
    window.onVelaReady = async () => {
      const ctx  = vela.app.context;
      if (ctx.theme?.isDark) document.documentElement.style.setProperty('--bg','#1a1a1f');
      document.documentElement.style.setProperty('--primary', ctx.theme?.primaryColor || '#7c6ff7');

      const data = await vela.miniapp.data();
      if (!data) {
        document.getElementById('title').textContent = 'Preparing recipe…';
        return;
      }
      document.getElementById('title').textContent = data.title || 'Recipe';
      if (data.servings) document.getElementById('meta').textContent = `Serves ${data.servings}${data.prepTime ? '  ·  ' + data.prepTime : ''}`;

      // Steps — convert string array to section objects for vela-step-through
      const steps = (data.steps || []).map((text, i) => ({ type: 'paragraph', text, level: 0 }));
      document.querySelector('vela-step-through').sections = steps;

      // Ingredients
      document.querySelector('vela-checklist').items = (data.ingredients || []).map(t => ({ text: t, done: false }));
      document.querySelector('vela-checklist').title = 'Ingredients';
    };
  </script>
  <style>
    :root{--primary:#7c6ff7;--surface2:#f3f4f6;--border:#e5e7eb;--muted:#9ca3af;--text:#111;--bg:#fff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding:16px}
    h1{font-size:22px;font-weight:700;margin-bottom:16px}
    section{margin-bottom:24px}
    h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
  </style>
</head>
<body>
  <h1 id="title">Loading…</h1>
  <p id="meta" style="color:var(--muted);font-size:13px;margin-bottom:16px"></p>
  <section><h2>Steps</h2><vela-step-through></vela-step-through></section>
  <section><h2>Ingredients</h2><vela-checklist></vela-checklist></section>
</body>
</html>
