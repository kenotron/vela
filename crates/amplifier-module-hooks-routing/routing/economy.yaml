name: economy
description: Minimum cost — fast and cheap models wherever viable
roles:
  general:
    description: Versatile catch-all, no specialization needed
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
      - provider: ollama
        model: llama3.2
  fast:
    description: Quick utility tasks — parsing, classification, file ops, bulk work
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
      - provider: ollama
        model: llama3.2
  coding:
    description: Code generation, implementation, debugging
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  ui-coding:
    description: Frontend/UI code — components, layouts, styling, spatial reasoning
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  security-audit:
    description: Vulnerability assessment, attack surface analysis, code auditing
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: gpt-5.5
  reasoning:
    description: Deep architectural reasoning, system design, complex multi-step analysis
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: gpt-5.5
  critique:
    description: Analytical evaluation — finding flaws in existing work, not generating solutions
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  creative:
    description: Design direction, aesthetic judgment, high-quality creative output
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  writing:
    description: Long-form content — documentation, marketing, case studies, storytelling
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  research:
    description: Deep investigation, information synthesis across multiple sources
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-5-mini
  vision:
    description: Understanding visual input — screenshots, diagrams, UI mockups
    candidates:
      - provider: openai
        model: gpt-5-mini
      - provider: gemini
        model: gemini-2.5-flash*
  image-gen:
    description: Image generation, visual mockup creation, visual ideation
    candidates:
      - provider: gemini
        model: imagen-*
      - provider: openai
        model: gpt-image-1
  critical-ops:
    description: High-reliability operational tasks — infrastructure, orchestration, coordination
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: gpt-5.5
