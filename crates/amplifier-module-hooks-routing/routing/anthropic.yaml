name: anthropic
description: Anthropic-only matrix — Claude exclusive, no third-party providers
roles:
  general:
    description: Versatile catch-all, no specialization needed
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  fast:
    description: Quick utility tasks — parsing, classification, file ops, bulk work
    candidates:
      - provider: anthropic
        model: claude-haiku-*
  coding:
    description: Code generation, implementation, debugging
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  ui-coding:
    description: Frontend/UI code — components, layouts, styling, spatial reasoning
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  security-audit:
    description: Vulnerability assessment, attack surface analysis, code auditing
    candidates:
      - provider: anthropic
        model: claude-opus-*
        config:
          reasoning_effort: high
  reasoning:
    description: Deep architectural reasoning, system design, complex multi-step analysis
    candidates:
      - provider: anthropic
        model: claude-opus-*
        config:
          reasoning_effort: high
  critique:
    description: Analytical evaluation — finding flaws in existing work, not generating solutions
    candidates:
      - provider: anthropic
        model: claude-opus-*
  creative:
    description: Design direction, aesthetic judgment, high-quality creative output
    candidates:
      - provider: anthropic
        model: claude-opus-*
  writing:
    description: Long-form content — documentation, marketing, case studies, storytelling
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  research:
    description: Deep investigation, information synthesis across multiple sources
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  vision:
    description: Understanding visual input — screenshots, diagrams, UI mockups
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  image-gen:
    description: Image generation, visual mockup creation — Anthropic does not generate images, falls back to Sonnet
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
  critical-ops:
    description: High-reliability operational tasks — infrastructure, orchestration, coordination
    candidates:
      - provider: anthropic
        model: claude-opus-*
        config:
          reasoning_effort: high
